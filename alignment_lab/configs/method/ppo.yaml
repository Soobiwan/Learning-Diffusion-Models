name: ppo
trainer: online_rl
objective: ppo
train_batch_size: 1
learning_rate: 5.0e-5
max_steps: 5
gradient_accumulation_steps: 8
rollout_batch_size: 2
update_minibatch_size: 1
epochs_per_rollout: 1
clip_range: 0.2
value_clip_range: 0.2
gamma: 0.99
gae_lambda: 0.95
value_loss_coef: 0.5
entropy_coef: 0.0
kl_coef: 0.02
max_prompt_length: 192
max_response_length: 64
max_sequence_length: 256
