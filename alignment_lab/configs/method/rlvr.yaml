name: rlvr
trainer: online_rl
objective: rlvr
train_batch_size: 8
learning_rate: 5.0e-5
max_steps: 300
gradient_accumulation_steps: 8
rollout_batch_size: 8
group_size: 4
update_minibatch_size: 2
epochs_per_rollout: 4
clip_range: 0.2
beta_kl: 0.05
max_prompt_length: 768
max_response_length: 256
max_sequence_length: 1024
